openapi: 3.0.0
info:
  title: Task Manager REST API
  description: Scalable REST API with JWT auth and role-based access
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [user, admin] }
    Task:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [pending, in-progress, completed] }
        priority: { type: string, enum: [low, medium, high] }
        user: { type: string }
        createdAt: { type: string }

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: John Doe }
                email: { type: string, example: john@example.com }
                password: { type: string, example: password123 }
      responses:
        201:
          description: User registered successfully
        409:
          description: Email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login successful, returns JWT token
        401:
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Current user profile

  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, in-progress, completed] }
        - in: query
          name: priority
          schema: { type: string, enum: [low, medium, high] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        200:
          description: List of tasks
    post:
      tags: [Tasks]
      summary: Create a task
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [pending, in-progress, completed] }
                priority: { type: string, enum: [low, medium, high] }
      responses:
        201:
          description: Task created

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get single task
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Task details
    put:
      tags: [Tasks]
      summary: Update task
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        200:
          description: Task updated
    delete:
      tags: [Tasks]
      summary: Delete task
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Task deleted

  /admin/users:
    get:
      tags: [Admin]
      summary: Get all users (admin only)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: List of all users
        403:
          description: Forbidden

  /admin/stats:
    get:
      tags: [Admin]
      summary: Get system statistics (admin only)
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: System stats
