<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow – API Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6dfa;
    --accent2: #fa6d8f;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* AUTH SCREEN */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: radial-gradient(ellipse at 30% 50%, #1a1040 0%, var(--bg) 60%),
                radial-gradient(ellipse at 70% 20%, #0d2040 0%, transparent 50%);
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .logo {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 0.25rem;
  }

  .logo span { color: var(--accent); }

  .auth-subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    font-family: var(--mono);
    margin-bottom: 2rem;
  }

  .tab-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .tab-btn {
    flex: 1;
    padding: 0.6rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .field {
    margin-bottom: 1rem;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.85rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
  }

  .field textarea { resize: vertical; min-height: 80px; }

  .btn {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.danger { background: var(--red); }
  .btn.sm { width: auto; padding: 0.4rem 0.9rem; font-size: 0.8rem; }
  .btn.outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* TOAST */
  #toast {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    pointer-events: none;
  }

  .toast-item {
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 0.85rem;
    animation: slideIn 0.3s ease;
    pointer-events: auto;
  }

  .toast-item.success { background: #1a3d2a; border: 1px solid #2d5a3f; color: var(--green); }
  .toast-item.error { background: #3d1a1a; border: 1px solid #5a2d2d; color: var(--red); }
  .toast-item.info { background: #1a1a3d; border: 1px solid #2d2d6a; color: #a0a0fa; }

  @keyframes slideIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* DASHBOARD */
  #dashboard { display: none; min-height: 100vh; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo { font-size: 1.1rem; font-weight: 800; }
  .topbar-logo span { color: var(--accent); }

  .topbar-right { display: flex; align-items: center; gap: 1rem; }

  .user-badge {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--muted);
  }

  .role-tag {
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 500;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
  }

  .role-tag.admin { color: var(--accent2); border-color: var(--accent2); }

  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 56px);
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1.5rem;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 600;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }

  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(124,109,250,0.08); }

  .nav-icon { width: 16px; height: 16px; opacity: 0.8; }

  .main {
    padding: 2rem;
    overflow-y: auto;
  }

  .page { display: none; }
  .page.active { display: block; }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .page-title { font-size: 1.4rem; font-weight: 800; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }

  .stat-label { font-size: 0.72rem; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .stat-value { font-size: 2rem; font-weight: 800; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 460px;
  }

  .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }

  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  .modal-actions .btn { flex: 1; }

  /* TASKS */
  .filter-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .filter-row select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    outline: none;
  }

  .tasks-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s;
  }

  .task-card:hover { border-color: var(--accent); }

  .task-info { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-desc { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); margin-top: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .task-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

  .badge {
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 500;
    flex-shrink: 0;
  }

  .badge.pending { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  .badge.in-progress { background: rgba(124,109,250,0.15); color: var(--accent); border: 1px solid rgba(124,109,250,0.3); }
  .badge.completed { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
  .badge.low { background: rgba(107,107,138,0.15); color: var(--muted); }
  .badge.medium { background: rgba(251,191,36,0.1); color: var(--yellow); }
  .badge.high { background: rgba(248,113,113,0.15); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

  /* Users table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.875rem;
  }

  th {
    text-align: left;
    padding: 0.75rem 1rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid rgba(42,42,61,0.5);
    font-family: var(--mono);
    font-size: 0.8rem;
  }

  tr:hover td { background: rgba(255,255,255,0.02); }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    color: var(--muted);
    gap: 0.75rem;
    font-family: var(--mono);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<div id="toast"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">Task<span>Flow</span></div>
    <div class="auth-subtitle">// REST API Dashboard v1.0</div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="admin@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn" onclick="login()">Login →</button>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display:none">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="john@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="min 6 characters" />
      </div>
      <button class="btn" onclick="register()">Create Account →</button>
    </div>

    <div style="margin-top:1rem; font-family:var(--mono); font-size:0.72rem; color:var(--muted); text-align:center;">
      API: <span id="api-url-display" style="color:var(--accent)">http://localhost:5000/api/v1</span>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">Task<span>Flow</span></div>
    <div class="topbar-right">
      <span class="user-badge" id="topbar-user"></span>
      <span class="role-tag" id="topbar-role">user</span>
      <button class="btn sm outline" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar">
      <div class="nav-item active" onclick="showPage('tasks')" id="nav-tasks">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        My Tasks
      </div>
      <div class="nav-item" onclick="showPage('admin')" id="nav-admin" style="display:none">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        Admin Panel
      </div>
      <div class="nav-item" onclick="showPage('profile')" id="nav-profile">
        <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Profile
      </div>
    </nav>

    <main class="main">
      <!-- TASKS PAGE -->
      <div class="page active" id="page-tasks">
        <div class="page-header">
          <div>
            <div class="page-title">My Tasks</div>
          </div>
          <button class="btn sm" onclick="openTaskModal()">+ New Task</button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value accent" id="stat-total">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value yellow" id="stat-pending">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">In Progress</div>
            <div class="stat-value accent" id="stat-inprogress">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Completed</div>
            <div class="stat-value green" id="stat-done">0</div>
          </div>
        </div>

        <div class="filter-row">
          <select id="filter-status" onchange="loadTasks()">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
          <select id="filter-priority" onchange="loadTasks()">
            <option value="">All Priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="tasks-list" id="tasks-list">
          <div class="loading-overlay"><div class="spinner"></div> Loading tasks...</div>
        </div>
      </div>

      <!-- ADMIN PAGE -->
      <div class="page" id="page-admin">
        <div class="page-header">
          <div class="page-title">Admin Panel</div>
        </div>
        <div class="stats-grid" id="admin-stats">
          <div class="loading-overlay"><div class="spinner"></div> Loading stats...</div>
        </div>
        <div style="margin-top:1.5rem">
          <div class="page-title" style="font-size:1.1rem; margin-bottom:1rem;">All Users</div>
          <div style="background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden;">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Joined</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-table"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- PROFILE PAGE -->
      <div class="page" id="page-profile">
        <div class="page-title" style="margin-bottom:1.5rem">Profile</div>
        <div style="background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; max-width:400px;">
          <div id="profile-info"></div>
          <div style="margin-top:1rem; font-family:var(--mono); font-size:0.78rem; color:var(--muted)">
            JWT Token (first 40 chars):<br>
            <span id="token-preview" style="color:var(--accent); word-break:break-all;"></span>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Task</div>
    <div class="field">
      <label>Title *</label>
      <input type="text" id="task-title" placeholder="Enter task title" />
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="task-desc" placeholder="Optional description..."></textarea>
    </div>
    <div class="field">
      <label>Status</label>
      <select id="task-status">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
    </div>
    <div class="field">
      <label>Priority</label>
      <select id="task-priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn outline" onclick="closeTaskModal()">Cancel</button>
      <button class="btn" id="modal-save-btn" onclick="saveTask()">Create Task</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api/v1';
let token = localStorage.getItem('token') || null;
let currentUser = JSON.parse(localStorage.getItem('user') || 'null');
let editingTaskId = null;

// ──────────────── UTILS ────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { headers, ...opts });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || data.errors?.[0]?.msg || 'Request failed');
  return data;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (i === 0) === (tab === 'login')));
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
}

async function login() {
  try {
    const data = await api('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      })
    });
    setSession(data.token, data.user);
    toast('Welcome back, ' + data.user.name + '!', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function register() {
  try {
    const data = await api('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value
      })
    });
    setSession(data.token, data.user);
    toast('Account created! Welcome ' + data.user.name, 'success');
  } catch (e) { toast(e.message, 'error'); }
}

function setSession(t, u) {
  token = t; currentUser = u;
  localStorage.setItem('token', t);
  localStorage.setItem('user', JSON.stringify(u));
  showDashboard();
}

function logout() {
  token = null; currentUser = null;
  localStorage.clear();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  toast('Logged out', 'info');
}

function showDashboard() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('topbar-user').textContent = currentUser.name;
  const roleTag = document.getElementById('topbar-role');
  roleTag.textContent = currentUser.role;
  roleTag.className = 'role-tag' + (currentUser.role === 'admin' ? ' admin' : '');
  if (currentUser.role === 'admin') document.getElementById('nav-admin').style.display = 'flex';
  showPage('tasks');
  loadTasks();
  loadProfile();
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page)?.classList.add('active');
  if (page === 'admin') loadAdmin();
}

// ──────────────── TASKS ────────────────
async function loadTasks() {
  const status = document.getElementById('filter-status').value;
  const priority = document.getElementById('filter-priority').value;
  let qs = '?limit=50';
  if (status) qs += '&status=' + status;
  if (priority) qs += '&priority=' + priority;

  document.getElementById('tasks-list').innerHTML = '<div class="loading-overlay"><div class="spinner"></div> Loading...</div>';
  try {
    const data = await api('/tasks' + qs);
    const tasks = data.data;
    updateStats(tasks);
    renderTasks(tasks);
  } catch (e) { toast(e.message, 'error'); }
}

function updateStats(tasks) {
  document.getElementById('stat-total').textContent = tasks.length;
  document.getElementById('stat-pending').textContent = tasks.filter(t => t.status === 'pending').length;
  document.getElementById('stat-inprogress').textContent = tasks.filter(t => t.status === 'in-progress').length;
  document.getElementById('stat-done').textContent = tasks.filter(t => t.status === 'completed').length;
}

function renderTasks(tasks) {
  const el = document.getElementById('tasks-list');
  if (!tasks.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>No tasks yet. Create your first one!</div>';
    return;
  }
  el.innerHTML = tasks.map(t => `
    <div class="task-card">
      <div class="task-info">
        <div class="task-title">${escHtml(t.title)}</div>
        ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
      </div>
      <span class="badge ${t.priority}">${t.priority}</span>
      <span class="badge ${t.status}">${t.status}</span>
      <div class="task-actions">
        <button class="btn sm outline" onclick="editTask('${t._id}','${escHtml(t.title)}','${escHtml(t.description||'')}','${t.status}','${t.priority}')">Edit</button>
        <button class="btn sm danger" onclick="deleteTask('${t._id}')">Del</button>
      </div>
    </div>
  `).join('');
}

function openTaskModal(id, title, desc, status, priority) {
  editingTaskId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Edit Task' : 'New Task';
  document.getElementById('modal-save-btn').textContent = id ? 'Update Task' : 'Create Task';
  document.getElementById('task-title').value = title || '';
  document.getElementById('task-desc').value = desc || '';
  document.getElementById('task-status').value = status || 'pending';
  document.getElementById('task-priority').value = priority || 'medium';
  document.getElementById('task-modal').classList.add('open');
}

function editTask(id, title, desc, status, priority) {
  openTaskModal(id, title, desc, status, priority);
}

function closeTaskModal() {
  document.getElementById('task-modal').classList.remove('open');
  editingTaskId = null;
}

async function saveTask() {
  const body = {
    title: document.getElementById('task-title').value,
    description: document.getElementById('task-desc').value,
    status: document.getElementById('task-status').value,
    priority: document.getElementById('task-priority').value
  };
  try {
    if (editingTaskId) {
      await api('/tasks/' + editingTaskId, { method: 'PUT', body: JSON.stringify(body) });
      toast('Task updated!', 'success');
    } else {
      await api('/tasks', { method: 'POST', body: JSON.stringify(body) });
      toast('Task created!', 'success');
    }
    closeTaskModal();
    loadTasks();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await api('/tasks/' + id, { method: 'DELETE' });
    toast('Task deleted', 'success');
    loadTasks();
  } catch (e) { toast(e.message, 'error'); }
}

// ──────────────── ADMIN ────────────────
async function loadAdmin() {
  try {
    const [statsRes, usersRes] = await Promise.all([api('/admin/stats'), api('/admin/users')]);
    const s = statsRes.data;
    document.getElementById('admin-stats').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value accent">${s.totalUsers}</div></div>
      <div class="stat-card"><div class="stat-label">Total Tasks</div><div class="stat-value green">${s.totalTasks}</div></div>
    `;
    document.getElementById('users-table').innerHTML = usersRes.data.map(u => `
      <tr>
        <td>${escHtml(u.name)}</td>
        <td style="color:var(--muted)">${escHtml(u.email)}</td>
        <td><span class="role-tag ${u.role === 'admin' ? 'admin' : ''}">${u.role}</span></td>
        <td style="color:var(--muted)">${new Date(u.createdAt).toLocaleDateString()}</td>
        <td>${u._id !== currentUser.id ? `<button class="btn sm danger" onclick="deleteUser('${u._id}')">Delete</button>` : '<span style="color:var(--muted);font-size:0.7rem">You</span>'}</td>
      </tr>
    `).join('');
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteUser(id) {
  if (!confirm('Delete user and all their tasks?')) return;
  try {
    await api('/admin/users/' + id, { method: 'DELETE' });
    toast('User deleted', 'success');
    loadAdmin();
  } catch (e) { toast(e.message, 'error'); }
}

// ──────────────── PROFILE ────────────────
function loadProfile() {
  document.getElementById('profile-info').innerHTML = `
    <div style="margin-bottom:0.5rem; font-size:0.78rem; font-family:var(--mono); color:var(--muted)">NAME</div>
    <div style="font-size:1.1rem; font-weight:700; margin-bottom:1rem">${escHtml(currentUser.name)}</div>
    <div style="margin-bottom:0.5rem; font-size:0.78rem; font-family:var(--mono); color:var(--muted)">EMAIL</div>
    <div style="font-family:var(--mono); margin-bottom:1rem">${escHtml(currentUser.email)}</div>
    <div style="margin-bottom:0.5rem; font-size:0.78rem; font-family:var(--mono); color:var(--muted)">ROLE</div>
    <span class="role-tag ${currentUser.role === 'admin' ? 'admin' : ''}">${currentUser.role}</span>
  `;
  document.getElementById('token-preview').textContent = token ? token.substring(0, 40) + '...' : 'N/A';
}

// ──────────────── HELPERS ────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-login if token exists
if (token && currentUser) showDashboard();
</script>
</body>
</html>
